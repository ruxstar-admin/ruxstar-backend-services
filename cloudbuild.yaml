substitutions:
  _REGION: us-central1
  _AR_REPO: ruxstar-backend
  _SERVICE_NAME: ruxstar-backend-services
  _RUNTIME_SA: backend-service-account@ruxstar-platform.iam.gserviceaccount.com
  _KYC_REDIRECT_URL: https://ruxstar.com/kyc/done
  _CASHFREE_ENV: production
  # Private bucket — backend streams photos via /public/businesses/:id/photos/:photoId (no GCS_PUBLIC_BASE_URL)
  _GCS_BUCKET: ruxstar-photos
  # Browser loads photos directly from Cloud Run (works before frontend photo route is deployed)
  _API_PUBLIC_BASE_URL: https://ruxstar-backend-services-391710984982.us-central1.run.app

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --port=8080
      - --allow-unauthenticated
      - --service-account=${_RUNTIME_SA}
      - --set-env-vars=NODE_ENV=production,CASHFREE_ENV=${_CASHFREE_ENV},CASHFREE_API_VERSION=2024-12-01,KYC_REDIRECT_URL=${_KYC_REDIRECT_URL},GCS_BUCKET=${_GCS_BUCKET},API_PUBLIC_BASE_URL=${_API_PUBLIC_BASE_URL}
      - --set-secrets=MONGODB_URI=mongodb-uri:latest,JWT_SECRET=jwt-secret:latest,MSG91_AUTH_KEY=msg91-auth-key:latest,MSG91_SENDER_ID=msg91-sender-id:latest,MSG91_TEMPLATE_ID=msg91-template-id:latest,CASHFREE_CLIENT_ID=cashfree-client-id:latest,CASHFREE_CLIENT_SECRET=cashfree-client-secret:latest

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
